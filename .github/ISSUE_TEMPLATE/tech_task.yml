name: Tech Task
description: Refactor, infrastructure, tooling, or other technical work
title: "[Tech] "
labels: ["type:tech"]
body:
  - type: textarea
    id: context
    attributes:
      label: Context / Motivation
      description: Why is this work needed?
    validations:
      required: true

  - type: textarea
    id: task
    attributes:
      label: Task Description
      description: What needs to be done?
    validations:
      required: true

  - type: textarea
    id: done
    attributes:
      label: Definition of Done
      placeholder: |
        - [ ] …
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - area:api
        - area:web
        - area:db
        - area:infra
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - priority:must
        - priority:should
    validations:
      required: true
