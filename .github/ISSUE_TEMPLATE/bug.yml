name: Bug Report
description: Report something that is broken or behaving incorrectly
title: "[Bug] "
labels: ["type:bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to …
        2. Click …
        3. See error …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS: macOS 14 / Windows 11 / Ubuntu 22
        - Browser: Chrome 123
        - API version / commit SHA:

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - area:web
        - area:api
        - area:db
        - area:infra
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - priority:must
        - priority:should
    validations:
      required: true
